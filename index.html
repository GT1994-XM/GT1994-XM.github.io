<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shoes Collection</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#f5f5f5;padding:20px}
.container{max-width:1200px;margin:0 auto}
.slider{width:100%;height:400px;background:#fff;border-radius:8px;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;margin-bottom:30px;padding:10px;gap:10px}
.slide{flex:0 0 auto;width:300px;height:350px;scroll-snap-align:start;}
.slide img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.grid img{width:100%;height:240px;object-fit:cover;border-radius:8px;background:#fff}
</style>
</head>
<body>
<div class="container">
<div class="slider">
<div class="slide"><img src="005-H2.jpg"></div>
<div class="slide"><img src="14H05-H5.JPG"></div>
<div class="slide"><img src="2D2960-H2.jpg"></div>
<div class="slide"><img src="503-F166 COFFEE.jpg"></div>
</div>
<div class="grid">
<img src="503-H42.JPG">
<img src="503-H70.jpg">
</div>
</div>
</body>
</html>
